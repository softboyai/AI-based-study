<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKU AI Study Planner - Profile Setup</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 
        Student Profile Setup Page
        Mount Kigali University - AI Study Planner
        This page allows students to set up their academic profile
        and add their courses with exam details.
    -->

    <!-- Navigation Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <img src="images/MKUR-logo.png" alt="MKU Logo" class="nav-logo">
                <div>
                    <h1>MKU Study Planner</h1>
                    <span>Mount Kigali University</span>
                </div>
            </div>
            <nav class="nav-links">
                <a href="profile.html" class="active">Profile</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="studyplan.html">Study Plan</a>
                <a href="progress.html">Progress</a>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <!-- Page Title -->
        <div class="page-title">
            <h2>Student Profile Setup</h2>
            <p>Complete your academic profile and add your courses to generate a personalized study plan.</p>
        </div>

        <!-- Alert Message Area -->
        <div id="alertMessage" class="hidden"></div>

        <!-- Profile Information Card -->
        <div class="card">
            <div class="card-header">
                <h2>Academic Information</h2>
            </div>
            <form id="profileForm" onsubmit="handleProfileUpdate(event)">
                <div class="dashboard-grid">
                    <div class="form-group">
                        <label for="program">Program / Department</label>
                        <input type="text" id="program" placeholder="e.g., BSc Computer Science" required>
                    </div>
                    <div class="form-group">
                        <label for="yearOfStudy">Year of Study</label>
                        <select id="yearOfStudy" required>
                            <option value="">Select Year</option>
                            <option value="1">Year 1</option>
                            <option value="2">Year 2</option>
                            <option value="3">Year 3</option>
                            <option value="4">Year 4</option>
                            <option value="5">Year 5</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="semester">Current Semester</label>
                        <select id="semester" required>
                            <option value="">Select Semester</option>
                            <option value="1">Semester 1</option>
                            <option value="2">Semester 2</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="preferredStudyHours">Preferred Daily Study Hours</label>
                        <select id="preferredStudyHours" required>
                            <option value="">Select Hours</option>
                            <option value="2">2 Hours</option>
                            <option value="3">3 Hours</option>
                            <option value="4">4 Hours</option>
                            <option value="5">5 Hours</option>
                            <option value="6">6 Hours</option>
                            <option value="7">7 Hours</option>
                            <option value="8">8 Hours</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary mt-2">Save Profile</button>
            </form>
        </div>

        <!-- Courses Section -->
        <div class="card">
            <div class="card-header">
                <h2>My Courses</h2>
                <button class="btn btn-primary btn-sm" onclick="showAddCourseForm()">+ Add Course</button>
            </div>

            <!-- Add Course Form (hidden by default) -->
            <div id="addCourseForm" class="hidden">
                <form onsubmit="handleAddCourse(event)">
                    <div class="dashboard-grid">
                        <div class="form-group">
                            <label for="courseName">Course Name</label>
                            <input type="text" id="courseName" placeholder="e.g., Database Systems" required>
                        </div>
                        <div class="form-group">
                            <label for="courseCode">Course Code</label>
                            <input type="text" id="courseCode" placeholder="e.g., CSC 401" required>
                        </div>
                        <div class="form-group">
                            <label for="creditHours">Credit Hours</label>
                            <select id="creditHours" required>
                                <option value="">Select</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="difficultyLevel">Difficulty Level (1-5)</label>
                            <select id="difficultyLevel" required>
                                <option value="">Select</option>
                                <option value="1">1 - Very Easy</option>
                                <option value="2">2 - Easy</option>
                                <option value="3">3 - Medium</option>
                                <option value="4">4 - Hard</option>
                                <option value="5">5 - Very Hard</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="previousGrade">Previous Grade (%)</label>
                            <input type="number" id="previousGrade" placeholder="e.g., 65" min="0" max="100" required>
                        </div>
                        <div class="form-group">
                            <label for="examDate">Exam Date</label>
                            <input type="date" id="examDate" required>
                        </div>
                        <div class="form-group">
                            <label for="instructor">Instructor (Optional)</label>
                            <input type="text" id="instructor" placeholder="e.g., Dr. Mugisha">
                        </div>
                    </div>
                    <div class="mt-2">
                        <button type="submit" class="btn btn-success btn-sm">Save Course</button>
                        <button type="button" class="btn btn-secondary btn-sm" onclick="hideAddCourseForm()">Cancel</button>
                    </div>
                </form>
                <hr style="margin: 20px 0; border-color: var(--gray);">
            </div>

            <!-- Courses Table -->
            <div id="coursesContainer">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/profile.js"></script>
</body>
</html>
