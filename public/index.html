<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKU AI Study Planner - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 
        Login and Register Page
        Mount Kigali University - AI Study Planner
        Handles authentication for all roles: admin, lecturer, student
        Redirects each role to their own dashboard after login
    -->

    <div class="auth-container">
        <div class="auth-box">
            <!-- University Branding -->
            <div class="university-brand">
                <img src="images/MKUR-logo.png" alt="MKU Logo" class="university-logo">
                <h1>Mount Kigali University</h1>
                <p class="subtitle">AI-Based Study Planner System</p>
            </div>

            <!-- Login/Register Tabs -->
            <div class="auth-tabs">
                <button id="loginTab" class="active" onclick="showTab('login')">Login</button>
                <button id="registerTab" onclick="showTab('register')">Register</button>
            </div>

            <!-- Alert Message Area -->
            <div id="alertMessage" class="hidden"></div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" placeholder="Enter your MKU email" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Login</button>
                <p style="text-align: center; margin-top: 12px;">
                    <a href="#" onclick="showTab('forgot')" style="font-size: 0.85rem;">Forgot Password?</a>
                </p>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="regFullName">Full Name</label>
                    <input type="text" id="regFullName" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="regEmail">Email Address</label>
                    <input type="email" id="regEmail" placeholder="Enter your MKU email" required>
                </div>
                <div class="form-group">
                    <label for="regNumber">Registration / Staff Number</label>
                    <input type="text" id="regNumber" placeholder="e.g., MKU/BSC/2021/001" required>
                </div>
                <div class="form-group">
                    <label for="regRole">Role</label>
                    <select id="regRole">
                        <option value="student">Student</option>
                        <option value="lecturer">Lecturer</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" placeholder="Letters + numbers (e.g., Study2024)" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="regConfirmPassword">Confirm Password</label>
                    <input type="password" id="regConfirmPassword" placeholder="Confirm your password" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Register</button>
            </form>

            <!-- Forgot Password Form -->
            <form id="forgotForm" class="hidden" onsubmit="handleForgotPassword(event)">
                <p style="color: var(--text-medium); font-size: 0.9rem; margin-bottom: 16px;">
                    Enter your email and registration number to reset your password.
                </p>
                <div class="form-group">
                    <label for="forgotEmail">Email Address</label>
                    <input type="email" id="forgotEmail" placeholder="Enter your registered email" required>
                </div>
                <div class="form-group">
                    <label for="forgotRegNumber">Registration / Staff Number</label>
                    <input type="text" id="forgotRegNumber" placeholder="e.g., MKU/BSC/2021/001" required>
                </div>
                <div class="form-group">
                    <label for="forgotNewPassword">New Password</label>
                    <input type="password" id="forgotNewPassword" placeholder="Letters + numbers (e.g., Study2024)" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="forgotConfirmPassword">Confirm New Password</label>
                    <input type="password" id="forgotConfirmPassword" placeholder="Confirm new password" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
                <p style="text-align: center; margin-top: 12px;">
                    <a href="#" onclick="showTab('login')" style="font-size: 0.85rem;">Back to Login</a>
                </p>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
